<style>
  /* ... mevcut stilleriniz ... */

  .tf-btn {
    padding: 7px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  
  /* Seçilen doğru buton */
  .tf-btn.correct-ans {
    background: rgba(34, 197, 94, 0.2) !important;
    border-color: #22c55e !important;
    color: #22c55e !important;
  }

  /* Seçilen yanlış buton */
  .tf-btn.wrong-ans {
    background: rgba(239, 68, 68, 0.2) !important;
    border-color: #ef4444 !important;
    color: #ef4444 !important;
  }

  /* Seçilmeyen butonları neredeyse yok et */
  .tf-btn.faded {
    opacity: 0.1 !important;
    pointer-events: none;
  }
</style>

<script>
function checkTF(btn, isCorrectAnswer, id, explanation) {
  const res = document.getElementById(id);
  const btns = btn.parentElement.querySelectorAll('button');
  
  // 1. Tüm butonları devre dışı bırak
  btns.forEach(b => b.disabled = true);

  // 2. Kullanıcının seçimini değerlendir
  const userChoseTrue = btn.textContent.trim() === 'Doğru';
  const userCorrect = userChoseTrue === isCorrectAnswer;

  // 3. Seçilen butonu vurgula
  if (userCorrect) {
    btn.classList.add('correct-ans');
  } else {
    btn.classList.add('wrong-ans');
  }

  // 4. Seçilmeyen diğer butonu "faded" sınıfı ile söndür
  btns.forEach(b => {
    if (b !== btn) {
      b.classList.add('faded');
    }
  });

  // 5. Geri bildirimi yazdır
  if (userCorrect) {
    res.innerHTML = '✅ ' + explanation;
    res.style.color = '#22c55e';
  } else {
    res.innerHTML = '❌ ' + explanation;
    res.style.color = '#ef4444';
  }
}
</script>
