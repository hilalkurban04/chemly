<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemly - Quiz</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b1120;
color:white;
padding:20px;
}

h1{
color:#38bdf8;
text-align:center;
}

.section{
max-width:800px;
margin:30px auto;
padding:20px;
background:#111827;
border-radius:12px;
border:1px solid #1e293b;
}

.question{
margin-bottom:20px;
padding:15px;
background:#0f172a;
border-radius:10px;
}

.btn-group{
display:flex;
gap:10px;
margin-top:10px;
}

.tf-btn{
padding:8px 16px;
border-radius:8px;
border:1px solid #334155;
background:#1e293b;
color:white;
cursor:pointer;
transition:0.3s;
}

.tf-btn:hover{
transform:scale(1.05);
}

/* doğru */
.correct-ans{
background:rgba(34,197,94,0.2);
border-color:#22c55e;
color:#22c55e;
}

/* yanlış */
.wrong-ans{
background:rgba(239,68,68,0.2);
border-color:#ef4444;
color:#ef4444;
}

/* pasif */
.faded{
opacity:0.2;
pointer-events:none;
}

.result{
margin-top:10px;
font-size:14px;
}
</style>

</head>

<body>

<h1>Chemly Quiz</h1>

<div class="section">

<!-- SORU 1 -->
<div class="question">
<p>1) N₂ bir bileşiktir.</p>

<div class="btn-group">
<button class="tf-btn" onclick="checkTF(this,false,'r1','N₂ element molekülüdür, bileşik değildir.')">Doğru</button>
<button class="tf-btn" onclick="checkTF(this,true,'r1','N₂ element molekülüdür, bileşik değildir.')">Yanlış</button>
</div>

<div id="r1" class="result"></div>
</div>

<!-- SORU 2 -->
<div class="question">
<p>2) HCl bir moleküldür.</p>

<div class="btn-group">
<button class="tf-btn" onclick="checkTF(this,true,'r2','HCl hem molekül hem bileşiktir (kovalent).')">Doğru</button>
<button class="tf-btn" onclick="checkTF(this,false,'r2','HCl molekül değildir demek yanlış olur.')">Yanlış</button>
</div>

<div id="r2" class="result"></div>
</div>

<!-- SORU 3 -->
<div class="question">
<p>3) NaCl moleküldür.</p>

<div class="btn-group">
<button class="tf-btn" onclick="checkTF(this,false,'r3','NaCl iyonik kristal yapıdır, molekül değildir.')">Doğru</button>
<button class="tf-btn" onclick="checkTF(this,true,'r3','NaCl iyonik kristal yapıdır, molekül değildir.')">Yanlış</button>
</div>

<div id="r3" class="result"></div>
</div>

</div>

<script>
function checkTF(btn, isCorrect, id, explanation){

const res = document.getElementById(id);
const buttons = btn.parentElement.querySelectorAll("button");

// disable
buttons.forEach(b => b.disabled = true);

// doğru mu yanlış mı
if(isCorrect){
btn.classList.add("correct-ans");
res.style.color = "#22c55e";
res.innerHTML = "✅ " + explanation;
}else{
btn.classList.add("wrong-ans");
res.style.color = "#ef4444";
res.innerHTML = "❌ " + explanation;
}

// diğerini soluklaştır
buttons.forEach(b=>{
if(b !== btn) b.classList.add("faded");
});

}
</script>

</body>
</html>
