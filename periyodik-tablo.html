<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Interaktif Periyodik Tablo</title>

<style>
:root{
  --bg:#0b1020;
  --surface:#121a2b;
  --border:#1f2a44;
  --text:#e5e7eb;
  --muted:#94a3b8;

  --metal:#60a5fa;
  --nonmetal:#f87171;
  --metalloid:#fbbf24;
  --noble:#34d399;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:10px;
}

.legend{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.legend button{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(18, 50px);
  gap:4px;
  justify-content:center;
}

.el{
  background:var(--surface);
  border:1px solid var(--border);
  height:50px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:11px;
  cursor:pointer;
  transition:.2s;
}

.el:hover{
  transform:scale(1.15);
  z-index:2;
}

.metal{border-color:var(--metal)}
.nonmetal{border-color:var(--nonmetal)}
.metalloid{border-color:var(--metalloid)}
.noble{border-color:var(--noble)}

.hidden{opacity:.1;pointer-events:none}

.info{
  margin-top:20px;
  background:var(--surface);
  border:1px solid var(--border);
  padding:15px;
  max-width:900px;
  margin-left:auto;
  margin-right:auto;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<h1>Periyodik Tablo</h1>

<div class="legend">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('metal')">Metal</button>
  <button onclick="filter('nonmetal')">Nonmetal</button>
  <button onclick="filter('metalloid')">Metalloid</button>
  <button onclick="filter('noble')">Noble Gas</button>
</div>

<div class="grid" id="grid"></div>

<div class="info" id="info"></div>

<script>
// ✔ GERÇEK TEMEL ELEMENT VERİSİ (İlk 36 + doğru yerleşim)
const elements = [
{n:1,s:"H",name:"Hydrogen",t:"nonmetal",r:1,c:1},
{n:2,s:"He",name:"Helium",t:"noble",r:1,c:18},

{n:3,s:"Li",name:"Lithium",t:"metal",r:2,c:1},
{n:4,s:"Be",name:"Beryllium",t:"metal",r:2,c:2},
{n:5,s:"B",name:"Boron",t:"metalloid",r:2,c:13},
{n:6,s:"C",name:"Carbon",t:"nonmetal",r:2,c:14},
{n:7,s:"N",name:"Nitrogen",t:"nonmetal",r:2,c:15},
{n:8,s:"O",name:"Oxygen",t:"nonmetal",r:2,c:16},
{n:9,s:"F",name:"Fluorine",t:"nonmetal",r:2,c:17},
{n:10,s:"Ne",name:"Neon",t:"noble",r:2,c:18},

{n:11,s:"Na",name:"Sodium",t:"metal",r:3,c:1},
{n:12,s:"Mg",name:"Magnesium",t:"metal",r:3,c:2},
{n:13,s:"Al",name:"Aluminum",t:"metal",r:3,c:13},
{n:14,s:"Si",name:"Silicon",t:"metalloid",r:3,c:14},
{n:15,s:"P",name:"Phosphorus",t:"nonmetal",r:3,c:15},
{n:16,s:"S",name:"Sulfur",t:"nonmetal",r:3,c:16},
{n:17,s:"Cl",name:"Chlorine",t:"nonmetal",r:3,c:17},
{n:18,s:"Ar",name:"Argon",t:"noble",r:3,c:18},

{n:19,s:"K",name:"Potassium",t:"metal",r:4,c:1},
{n:20,s:"Ca",name:"Calcium",t:"metal",r:4,c:2},
{n:26,s:"Fe",name:"Iron",t:"metal",r:4,c:8},
{n:29,s:"Cu",name:"Copper",t:"metal",r:4,c:11},
{n:30,s:"Zn",name:"Zinc",t:"metal",r:4,c:12},
{n:35,s:"Br",name:"Bromine",t:"nonmetal",r:4,c:17},
{n:36,s:"Kr",name:"Krypton",t:"noble",r:4,c:18},
];

const grid = document.getElementById("grid");
const info = document.getElementById("info");

// build map
const map = {};
elements.forEach(e => map[`${e.r}-${e.c}`] = e);

// render full grid
for(let r=1;r<=4;r++){
  for(let c=1;c<=18;c++){
    const key = `${r}-${c}`;
    const e = map[key];

    const div = document.createElement("div");
    div.className = "el";

    if(e){
      div.classList.add(e.t);
      div.innerHTML = `<b>${e.s}</b><small>${e.n}</small>`;
      div.onclick = () => {
        info.style.display="block";
        info.innerHTML = `
          <h3>${e.name} (${e.s})</h3>
          <p>Atomic No: ${e.n}</p>
          <p>Type: ${e.t}</p>
        `;
      };
    } else {
      div.style.opacity=0.05;
    }

    grid.appendChild(div);
  }
}

// filter
function filter(type){
  document.querySelectorAll(".el").forEach(el=>{
    if(type==="all") el.classList.remove("hidden");
    else if(!el.classList.contains(type)) el.classList.add("hidden");
    else el.classList.remove("hidden");
  });
}
</script>

</body>
</html>
